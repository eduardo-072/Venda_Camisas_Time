{% extends 'template.html' %}

{% block titulo %}Editar Usuário{% endblock %}

{% block conteudo %}

<div class="dash-header">
    <div>
        <span class="section-label">Dashboard → Usuários → Editar</span>
        <h1>Editar Usuário</h1>
    </div>
    <a href="{% url 'usuarios' %}" class="btn-ghost-sm">← Voltar</a>
</div>

<form action="{% url 'editusuarioadmin' usuario.id %}" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Salvar Alterações">
</form>

{% endblock %}
