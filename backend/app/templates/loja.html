{% extends 'template.html' %}

{% block titulo %}Loja — Produtos{% endblock %}

{% block conteudo %}

<section class="loja-header">
    <h1 style="color: #0a84ff;"><span>Nossos Produtos</span></h1>
</section>

<div class="loja-grid">
    {% for prod in produtos %}
        <!-- Substitua 'product-card' pelo nome da classe que você usa na home -->
        <div class="card-produto"> 
            <img src="{{ prod.imagem.url }}" alt="{{ prod.nome }}">
            <h3>{{ prod.nome }}</h3>
            <hr>
            <span class="product-price">R$ {{ prod.preco }}</span>
            <a href="{% url 'add_to_cart' prod.id %}" class="btn-comprar">Comprar</a>
        </div>
    {% empty %}
        <p>Nenhum produto disponível.</p>
    {% endfor %}
</div>

{% endblock %}
