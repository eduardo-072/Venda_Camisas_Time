{% extends 'template.html' %}

{% block titulo %}Editar Produto{% endblock %}

{% block conteudo %}

<div class="dash-header">
    <div>
        <span class="section-label">Produtos → Editar</span>
        <h1>Editar Produto</h1>
    </div>
    <a href="{% url 'produto' %}" class="btn-ghost-sm">← Voltar</a>
</div>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    {% if produto.imagem %}
    <p style="margin-top: 12px; color: var(--text-tertiary); font-size: 13px;">
        Imagem atual:
        <img src="{{ produto.imagem.url }}" width="60px" style="border-radius: 8px; margin-left: 8px; vertical-align: middle;">
    </p>
    {% endif %}
    <input type="submit" value="Salvar Alterações">
</form>

{% endblock %}
